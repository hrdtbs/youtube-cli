template:
  # Optional. {{title}} is replaced with the filename (without extension).
  # title: "【新曲】{{title}}"
  description: |
    {{title}} をお楽しみください。

    チャンネル登録・高評価お願いします。
    #music #original
  tags:
    - music
    - original
  categoryId: "10"
  defaultLanguage: ja

# Optional: add each uploaded video to a playlist after upload.
# playlistId accepts a playlist ID (PL...) or a URL with ?list=...
upload:
  playlistId: "PLxxxxxxxxxxxxxxxx"

schedule:
  timezone: Asia/Tokyo
  # Fixed date (YYYY-MM-DD) or auto (latest publish date + 1 day).
  startDate: auto
  slots:
    # Every day at 18:00 (alternative to listing weekday 0-6).
    - daily: false
      time: "18:00"
    # Or specific weekdays (0=Sunday, 6=Saturday).
    - weekday: 3
      time: "12:00"
